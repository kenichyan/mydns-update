# ==========================================
# MyDNS.JP Configuration
# ==========================================

# Credentials: ("ID:Password" "ID:Password" ...)
MYDNS_CREDENTIALS=(
   mydns123456:Password1
   mydns123457:Password2
)

# Notification enable setting (yes/no)
ENABLE_IPV4="yes"
ENABLE_IPV6="yes"

# Notification destination URL
IPV4_URL="http://ipv4.mydns.jp/login.html"
IPV6_URL="http://ipv6.mydns.jp/login.html"

# External IP check URL (uses external service to get the current public IP before update)
# Use a lightweight API to avoid undue load on MyDNS itself
CHECK_IPV4_URL="https://ipv4.icanhazip.com"
CHECK_IPV6_URL="https://ipv6.icanhazip.com"

# Timeout settings (seconds)
TIMEOUT=15
CONN_TIMEOUT=10

# Runtime environment settings
USER_AGENT="MyDNS-Update-Script/1.4"
LOG_FILE="/var/log/mydns_update.log"

# Cache directory (stores previous IP for each ID)
CACHE_DIR="/var/cache/mydns"
